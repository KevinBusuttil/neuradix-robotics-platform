apiVersion: contracts.neuradix.io/v1alpha1
kind: StreamContract
metadata:
  namespace: io.neuradix.actuation
  name: thrust-command
  version: 1.0.0

spec:
  description: A safety-gated vertical thrust command for the actuator.
  payload:
    type: object
    fields:
      thrust:
        type: float64

  semantics:
    frame: vehicle/base
    clockDomain: monotonic
    authoritativeTimestamp: arrival
    maximumAge: 50ms

  delivery:
    capacity: 4
    overflow: reject
