<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#1f2937" flood-opacity="0.16"/>
    </filter>
    <style>
      .title{font-family:Arial,Helvetica,sans-serif;font-weight:700;fill:#102a43}
      .subtitle{font-family:Arial,Helvetica,sans-serif;font-weight:400;fill:#486581}
      .nodeTitle{font-family:Arial,Helvetica,sans-serif;font-weight:700;fill:#102a43}
      .nodeText{font-family:Arial,Helvetica,sans-serif;font-weight:400;fill:#334e68}
      .small{font-size:21px}
      .medium{font-size:25px}
      .line{fill:none;stroke-width:5;stroke-linecap:round;opacity:.78}
    </style>
  </defs>
  <rect width="1800" height="1200" fill="#f7fafc"/>
  <text x="900" y="70" text-anchor="middle" class="title" font-size="43">Neuradix Robotics Platform Ecosystem</text>
  <text x="900" y="108" text-anchor="middle" class="subtitle" font-size="22">Rust-first • contract-driven • simulation-native • safety-governed</text>
  <path class="line" stroke="#2867b2" d="M900 570 C650 500 545 350 415 275"/>
  <path class="line" stroke="#f08c2e" d="M900 570 C1180 475 1285 350 1400 275"/>
  <path class="line" stroke="#22a06b" d="M900 620 C625 665 530 780 400 875"/>
  <path class="line" stroke="#7b61c9" d="M900 620 C1180 675 1295 790 1415 880"/>
  <path class="line" stroke="#d14b67" d="M820 595 C585 585 445 530 315 510"/>
  <path class="line" stroke="#1796a8" d="M980 595 C1215 585 1370 535 1490 505"/>
  <path class="line" stroke="#64748b" d="M900 670 C900 790 900 900 900 995"/>
  <g filter="url(#shadow)">
    <rect x="690" y="475" rx="34" ry="34" width="420" height="210" fill="#ffffff" stroke="#2a6fbb" stroke-width="6"/>
    <circle cx="900" cy="525" r="28" fill="#2a6fbb"/>
    <path d="M884 526 l11 11 23-27" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="900" y="585" text-anchor="middle" class="title" font-size="39">NEURADIX</text>
    <text x="900" y="624" text-anchor="middle" class="nodeTitle" font-size="25">Robotics Platform</text>
    <text x="900" y="655" text-anchor="middle" class="subtitle" font-size="19">Dependable autonomy from simulation to deployment</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="120" y="145" rx="26" width="520" height="245" fill="#eef6ff" stroke="#2867b2" stroke-width="4"/>
    <text x="380" y="190" text-anchor="middle" class="nodeTitle" font-size="31">Common Foundations</text>
    <text x="155" y="235" class="nodeText small">• Contracts and code generation</text>
    <text x="155" y="270" class="nodeText small">• Runtime and transport-neutral data plane</text>
    <text x="155" y="305" class="nodeText small">• Time, frames, units and uncertainty</text>
    <text x="155" y="340" class="nodeText small">• Safety, security, record/replay and CLI</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1160" y="145" rx="26" width="520" height="245" fill="#fff5ea" stroke="#f08c2e" stroke-width="4"/>
    <text x="1420" y="190" text-anchor="middle" class="nodeTitle" font-size="31">Execution Profiles</text>
    <text x="1195" y="235" class="nodeText small">• Edge: Linux-class autonomy</text>
    <text x="1195" y="270" class="nodeText small">• Embedded Tiny / MCU / Connected / High</text>
    <text x="1195" y="305" class="nodeText small">• Flight: static qualification-oriented runtime</text>
    <text x="1195" y="340" class="nodeText small">• Independent Safety island and FDIR</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="60" y="420" rx="26" width="500" height="245" fill="#fff0f4" stroke="#d14b67" stroke-width="4"/>
    <text x="310" y="465" text-anchor="middle" class="nodeTitle" font-size="31">Hardware and Interoperability</text>
    <text x="95" y="510" class="nodeText small">• Arduino/AVR generated C++ endpoints</text>
    <text x="95" y="545" class="nodeText small">• ESP32, STM32, RP2040 and nRF native Rust</text>
    <text x="95" y="580" class="nodeText small">• CAN, serial, RS-485, Ethernet and wireless</text>
    <text x="95" y="615" class="nodeText small">• ROS 2, MAVLink, DDS, Zenoh and industrial bridges</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1240" y="420" rx="26" width="500" height="245" fill="#eaf9fb" stroke="#1796a8" stroke-width="4"/>
    <text x="1490" y="465" text-anchor="middle" class="nodeTitle" font-size="31">Human and Operations</text>
    <text x="1275" y="510" class="nodeText small">• Studio Web/Desktop and Studio XR</text>
    <text x="1275" y="545" class="nodeText small">• Ground identity, authority and mission control</text>
    <text x="1275" y="580" class="nodeText small">• Fleet inventory, deployment and updates</text>
    <text x="1275" y="615" class="nodeText small">• Registry, packages, evidence and audit</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="120" y="770" rx="26" width="545" height="255" fill="#ecfbf4" stroke="#22a06b" stroke-width="4"/>
    <text x="392" y="817" text-anchor="middle" class="nodeTitle" font-size="31">Domain Profiles</text>
    <text x="155" y="862" class="nodeText small">• Marine: AUV, USV, sonar and acoustic links</text>
    <text x="155" y="897" class="nodeText small">• Aero: UAV, airspace and collision safety</text>
    <text x="155" y="932" class="nodeText small">• Space/Flight: simulation, payloads and spacecraft</text>
    <text x="155" y="967" class="nodeText small">• Ground robotics and heterogeneous teams</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1135" y="770" rx="26" width="545" height="255" fill="#f3efff" stroke="#7b61c9" stroke-width="4"/>
    <text x="1407" y="817" text-anchor="middle" class="nodeTitle" font-size="31">Autonomy and Coordination</text>
    <text x="1170" y="862" class="nodeText small">• Mission executive and task planning</text>
    <text x="1170" y="897" class="nodeText small">• Swarm membership, roles and allocation</text>
    <text x="1170" y="932" class="nodeText small">• Cooperative localization and shared world model</text>
    <text x="1170" y="967" class="nodeText small">• AI perception with confidence and safe fallback</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="625" y="990" rx="26" width="550" height="150" fill="#ffffff" stroke="#64748b" stroke-width="4"/>
    <text x="900" y="1035" text-anchor="middle" class="nodeTitle" font-size="31">Engineering Outcomes</text>
    <text x="900" y="1075" text-anchor="middle" class="nodeText small">Deterministic • explainable • offline-first • secure</text>
    <text x="900" y="1110" text-anchor="middle" class="nodeText small">Simulation parity • reproducible replay • open ecosystem</text>
  </g>
</svg>